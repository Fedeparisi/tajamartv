name: tajamar_tv_plus
description: "TAJAMAR TV+ - Plataforma OTT/IPTV Premium"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.6
  cloud_firestore: ^4.15.6
  firebase_storage: ^11.6.2
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.16
  firebase_remote_config: ^4.3.6
  firebase_messaging: ^14.7.16

  # Local Storage & Security
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Player
  video_player: ^2.8.2
  youtube_player_iframe: ^5.1.2

  # UI / Design / Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  glassmorphism_ui: ^0.2.0
  responsive_builder: ^0.7.0
  
  # Utilities
  dio: ^5.4.1
  intl: ^0.20.2
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  webview_win_floating: ^3.0.3
  youtube_explode_dart: ^3.1.0
  fvp: ^0.37.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/
    - assets/animations/
